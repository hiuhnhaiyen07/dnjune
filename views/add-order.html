<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo đơn - SMM Panel</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f7fb;
    }
    .sidebar {
      background: #0f172a;
    }
    .card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    #sidebar {
      transition: all .3s;
    }
    @media (max-width:768px) {
      #sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        height: 100%;
        z-index: 50;
      }
      #sidebar.open {
        left: 0;
      }
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.4);
      z-index: 40;
      display: none;
    }
    #overlay.show {
      display: block;
    }
  </style>
</head>

<body>
  <div class="flex h-screen">

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar w-64 text-white flex flex-col">
      <div class="p-6 text-2xl font-bold border-b border-slate-700">
        SMM PANEL
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a href="dashboard.html" class="block px-4 py-3 rounded-lg hover:bg-slate-700">Dashboard</a>
        <a href="services.html" class="block px-4 py-3 rounded-lg hover:bg-slate-700">Dịch vụ</a>
        <a href="add-order.html" class="block px-4 py-3 rounded-lg bg-blue-600">Tạo đơn</a>
        <a href="orders.html" class="block px-4 py-3 rounded-lg hover:bg-slate-700">Đơn hàng</a>
        <a href="deposit.html" class="block px-4 py-3 rounded-lg hover:bg-slate-700">Nạp tiền</a>
      </nav>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">
      <header class="bg-white shadow-sm p-4 flex items-center gap-3">
        <button id="menuBtn" class="text-2xl md:hidden">☰</button>
        <h1 class="text-lg font-semibold">Tạo đơn hàng</h1>
      </header>

      <main class="p-6 overflow-y-auto">
        <div class="card p-8 max-w-2xl mx-auto">

          <!-- SERVICE -->
          <div class="mb-6">
            <label class="text-sm text-gray-600 block mb-1">Chọn dịch vụ</label>
            <select id="service" class="w-full border p-3 rounded-lg">
              <option value="">Đang tải dịch vụ...</option>
            </select>
          </div>

          <!-- MIN / MAX -->
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-gray-50 p-3 rounded text-center">
              Min: <span id="min">-</span>
            </div>
            <div class="bg-gray-50 p-3 rounded text-center">
              Max: <span id="max">-</span>
            </div>
          </div>

          <!-- LINK -->
          <div class="mb-6">
            <label class="text-sm text-gray-600 block mb-1">Link bài viết</label>
            <input id="link" placeholder="https://..." class="w-full border p-3 rounded-lg" />
          </div>

          <!-- QUANTITY -->
          <div class="mb-6">
            <label class="text-sm text-gray-600 block mb-1">Số lượng</label>
            <input type="number" id="quantity" placeholder="Nhập số lượng" min="1" class="w-full border p-3 rounded-lg" />
          </div>

          <!-- PRICE -->
          <div class="bg-blue-50 p-4 rounded-lg mb-6 text-center">
            Tổng tiền: <span class="font-bold text-blue-600" id="price">0 VND</span>
          </div>

          <button onclick="createOrder()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium">
            Đặt đơn
          </button>

          <div id="message" class="mt-4 text-sm text-center text-red-600"></div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location = "login.html";
    }

    let services = [];
    let selected = null;

    /* LOAD SERVICES */
    async function loadServices() {
      try {
        const res = await fetch("/api/services", {
          headers: { Authorization: "Bearer " + token }
        });

        if (!res.ok) {
          document.getElementById("message").innerText = "Không tải được danh sách dịch vụ";
          return;
        }

        services = await res.json();

        const select = document.getElementById("service");
        select.innerHTML = '<option value="">Chọn dịch vụ</option>';

        services.forEach(s => {
          const opt = document.createElement("option");
          opt.value = s._id;
          opt.textContent = s.name;
          opt.dataset.rate = s.rate || 0;
          opt.dataset.min = s.min || "-";
          opt.dataset.max = s.max || "-";
          select.appendChild(opt);
        });

        // Gắn event change
        select.addEventListener("change", updateInfo);
      } catch (e) {
        console.error("Lỗi load services:", e);
        document.getElementById("message").innerText = "Lỗi kết nối server";
      }
    }

    /* UPDATE MIN/MAX & PRICE khi chọn dịch vụ */
    function updateInfo() {
      const select = document.getElementById("service");
      const id = select.value;

      selected = services.find(s => s._id === id);

      if (selected) {
        document.getElementById("min").innerText = selected.min || "-";
        document.getElementById("max").innerText = selected.max || "-";
        calculatePrice(); // Tính lại giá khi đổi dịch vụ
      } else {
        document.getElementById("min").innerText = "-";
        document.getElementById("max").innerText = "-";
        document.getElementById("price").innerText = "0 VND";
      }

      document.getElementById("message").innerText = "";
    }

    /* TÍNH TỔNG TIỀN REALTIME */
    function calculatePrice() {
      const qInput = document.getElementById("quantity");
      const q = Number(qInput.value) || 0;

      if (!selected || q <= 0) {
        document.getElementById("price").innerText = "0 VND";
        return;
      }

      const rate = Number(selected.rate) || 0;
      const total = Math.round((q / 1000) * rate);

      document.getElementById("price").innerText = total.toLocaleString() + " VND";
    }

    /* EVENT INPUT QUANTITY */
    document.getElementById("quantity").addEventListener("input", () => {
      const q = Number(document.getElementById("quantity").value);
      if (selected) {
        if (q < selected.min && q > 0) {
          document.getElementById("price").innerText = "Chưa đủ min (" + selected.min + ")";
        } else if (q > selected.max) {
          document.getElementById("price").innerText = "Vượt max (" + selected.max + ")";
        } else {
          calculatePrice();
        }
      }
    });

    /* CREATE ORDER */
    async function createOrder() {
      const msg = document.getElementById("message");
      msg.innerText = "";

      const serviceId = document.getElementById("service").value;
      const link = document.getElementById("link").value.trim();
      const quantity = Number(document.getElementById("quantity").value);

      selected = services.find(s => s._id === serviceId);

      if (!selected) {
        msg.innerText = "Vui lòng chọn dịch vụ";
        return;
      }
      if (!link) {
        msg.innerText = "Vui lòng nhập link";
        return;
      }
      if (quantity <= 0) {
        msg.innerText = "Số lượng phải lớn hơn 0";
        return;
      }
      if (quantity < selected.min) {
        msg.innerText = `Số lượng tối thiểu là ${selected.min}`;
        return;
      }
      if (quantity > selected.max) {
        msg.innerText = `Số lượng tối đa là ${selected.max}`;
        return;
      }

      try {
        const res = await fetch("/api/orders/create", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({
            service: serviceId,  // gửi _id của dịch vụ
            link,
            quantity
          })
        });

        const data = await res.json();

        if (res.ok) {

<script>
  let services = []; // Lưu danh sách dịch vụ từ API

  // Load dịch vụ khi trang mở
  async function loadServices() {
    try {
      const res = await fetch("/api/services");
      if (!res.ok) throw new Error("Lỗi tải dịch vụ");
      services = await res.json();

      const select = document.getElementById("serviceSelect"); // ID của <select>
      select.innerHTML = '<option value="">Chọn dịch vụ</option>';

      services.forEach(s => {
        const option = document.createElement("option");
        option.value = s.service; // hoặc s.id nếu backend trả s.id
        option.text = `${s.name} (Rate: ${s.rate} VND/1000)`;
        option.dataset.min = s.min;
        option.dataset.max = s.max;
        option.dataset.rate = s.rate;
        select.appendChild(option);
      });

      console.log("Loaded", services.length, "dịch vụ"); // debug
    } catch (err) {
      console.error(err);
      alert("Không tải được danh sách dịch vụ!");
    }
  }

  // Khi chọn dịch vụ → cập nhật Min/Max và tính tiền
  function updateServiceInfo() {
    const select = document.getElementById("serviceSelect");
    const selectedOption = select.options[select.selectedIndex];

    if (!selectedOption || !selectedOption.value) {
      document.getElementById("min").textContent = "-";
      document.getElementById("max").textContent = "-";
      document.getElementById("total").textContent = "0 VND";
      return;
    }

    const min = selectedOption.dataset.min || "-";
    const max = selectedOption.dataset.max || "-";
    const rate = Number(selectedOption.dataset.rate) || 0;

    document.getElementById("min").textContent = min;
    document.getElementById("max").textContent = max;

    // Tính tổng tiền
    calculateTotal(rate);
  }

  // Tính tổng tiền khi thay đổi số lượng
  function calculateTotal(rate = 0) {
    const quantity = Number(document.getElementById("quantity").value) || 0;
    const total = quantity * (rate / 1000); // rate là giá /1000 lượt
    document.getElementById("total").textContent = total.toLocaleString("vi-VN") + " VND";
  }

  // Gửi đơn hàng
  async function createOrder() {
    const serviceId = document.getElementById("serviceSelect").value;
    const link = document.getElementById("link").value.trim();
    const quantity = Number(document.getElementById("quantity").value);

    if (!serviceId || !link || quantity <= 0) {
      alert("Vui lòng chọn dịch vụ, nhập link và số lượng hợp lệ!");
      return;
    }

    try {
      const res = await fetch("/api/orders", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + localStorage.getItem("token") // nếu cần token
        },
        body: JSON.stringify({ service: serviceId, link, quantity })
      });

      const data = await res.json();

      if (res.ok) {
        alert("Đặt đơn thành công! Order ID: " + (data._id || data.orderId));
        // Reset form
        document.getElementById("serviceSelect").value = "";
        document.getElementById("link").value = "";
        document.getElementById("quantity").value = "";
        document.getElementById("total").textContent = "0 VND";
      } else {
        alert("Đặt đơn thất bại: " + (data.error || "Lỗi server"));
      }
    } catch (err) {
      console.error(err);
      alert("Lỗi kết nối: " + err.message);
    }
  }

  // Gọi load khi trang mở
  window.onload = loadServices;

  // Gắn sự kiện change cho dropdown
  document.getElementById("serviceSelect").addEventListener("change", updateServiceInfo);

  // Gắn sự kiện input cho số lượng
  document.getElementById("quantity").addEventListener("input", () => {
    const select = document.getElementById("serviceSelect");
    const rate = select.options[select.selectedIndex]?.dataset.rate || 0;
    calculateTotal(rate);
  });
</script>
</body>
</html>
