<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng ký - SMM Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e8f1ff,#ffffff);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.glass{
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.75);
border:1px solid rgba(255,255,255,0.3);
}

</style>

</head>

<body>

<div class="w-full max-w-md px-6">

<div class="glass shadow-xl rounded-3xl p-10">

<div class="text-center mb-8">

<h1 class="text-3xl font-bold text-blue-600">
SMM PANEL
</h1>

<p class="text-gray-500 text-sm mt-2">
Tạo tài khoản mới
</p>

</div>

<form id="registerForm" class="space-y-6">

<div>

<label class="text-sm font-medium text-gray-600">
Username
</label>

<input
type="text"
id="username"
placeholder="Tối thiểu 4 ký tự"
required
class="mt-2 w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none"
/>

</div>

<div>

<label class="text-sm font-medium text-gray-600">
Gmail
</label>

<input
type="email"
id="email"
placeholder="example@gmail.com"
required
class="mt-2 w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none"
/>

</div>

<div>

<label class="text-sm font-medium text-gray-600">
Mật khẩu
</label>

<input
type="password"
id="password"
placeholder="Tối thiểu 6 ký tự"
required
class="mt-2 w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none"
/>

</div>

<div>

<label class="text-sm font-medium text-gray-600">
Xác nhận mật khẩu
</label>

<input
type="password"
id="confirm"
placeholder="Nhập lại mật khẩu"
required
class="mt-2 w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none"
/>

</div>

<button
type="submit"
id="registerBtn"
class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition">

Tạo tài khoản

</button>

<div id="message" class="text-center text-sm"></div>

</form>

<div class="text-center mt-6 text-sm">

Đã có tài khoản?

<a href="login.html" class="text-blue-600 hover:underline">
Đăng nhập
</a>

</div>

</div>

</div>

<script>

const form = document.getElementById("registerForm")

form.addEventListener("submit", async (e)=>{

e.preventDefault()

const btn = document.getElementById("registerBtn")
const msg = document.getElementById("message")

const username = document.getElementById("username").value.trim()
const email = document.getElementById("email").value.trim()
const password = document.getElementById("password").value
const confirm = document.getElementById("confirm").value

msg.innerText=""

if(username.length<4){
msg.innerText="Username tối thiểu 4 ký tự"
return
}

if(!email.endsWith("@gmail.com")){
msg.innerText="Email phải là gmail"
return
}

if(password.length<6){
msg.innerText="Mật khẩu tối thiểu 6 ký tự"
return
}

if(password!==confirm){
msg.innerText="Mật khẩu không khớp"
return
}

btn.disabled=true
btn.innerText="Đang tạo..."

try{

const res = await fetch("/api/auth/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
email,
password
})
})

const data = await res.json()

if(res.ok){

msg.style.color="green"
msg.innerText="Đăng ký thành công"

setTimeout(()=>{
window.location.href="/login.html"
},1500)

}else{

msg.style.color="red"
msg.innerText=data.error || "Đăng ký thất bại"

}

}catch(err){

msg.style.color="red"
msg.innerText="Không kết nối được server"

}

btn.disabled=false
btn.innerText="Tạo tài khoản"

})

</script>

</body>
</html>
