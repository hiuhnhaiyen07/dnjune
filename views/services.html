<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dịch vụ - SMM Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f7fb;
}

.sidebar{
background:#0f172a;
}

.card{
background:white;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

</style>

</head>

<body>

<div class="flex h-screen">

<!-- SIDEBAR -->

<div class="sidebar w-64 text-white flex flex-col">

<div class="p-6 text-2xl font-bold border-b border-slate-700">
SMM PANEL
</div>

<nav class="flex-1 p-4 space-y-2">

<a href="dashboard.html" class="block px-4 py-3 rounded-lg hover:bg-slate-700">
Dashboard
</a>

<a href="services.html" class="block px-4 py-3 rounded-lg bg-blue-600">
Dịch vụ
</a>

<a href="add-order.html" class="block px-4 py-3 rounded-lg hover:bg-slate-700">
Tạo đơn
</a>

<a href="orders.html" class="block px-4 py-3 rounded-lg hover:bg-slate-700">
Đơn hàng
</a>

<a href="deposit.html" class="block px-4 py-3 rounded-lg hover:bg-slate-700">
Nạp tiền
</a>

</nav>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<!-- HEADER -->

<header class="bg-white shadow-sm p-4 flex justify-between">

<h1 class="font-semibold text-lg">
Danh sách dịch vụ
</h1>

<input
id="search"
placeholder="Tìm dịch vụ..."
class="border px-4 py-2 rounded-lg"
/>

</header>

<!-- CONTENT -->

<main class="p-6 overflow-y-auto">

<div class="card p-6">

<table class="w-full text-sm">

<thead>

<tr class="border-b text-gray-600">

<th class="py-3 text-left">
ID
</th>

<th>
Tên dịch vụ
</th>

<th>
Giá / 1000
</th>

<th>
Min
</th>

<th>
Max
</th>

<th>
Hành động
</th>

</tr>

</thead>

<tbody id="servicesTable">

</tbody>

</table>

</div>

</main>

</div>

</div>

<script>

const token=localStorage.getItem("token")

if(!token){
window.location="login.html"
}

let services=[]

/* LOAD SERVICES */

async function loadServices(){

const res=await fetch("/api/services",{

headers:{
Authorization:"Bearer "+token
}

})

services=await res.json()

renderServices(services)

}

function renderServices(list){

const table=document.getElementById("servicesTable")

table.innerHTML=""

list.forEach(s=>{

const tr=document.createElement("tr")

tr.className="border-b hover:bg-gray-50"

tr.innerHTML=`

<td class="py-3">${s.service}</td>

<td>${s.name}</td>

<td>${s.rate}</td>

<td>${s.min}</td>

<td>${s.max}</td>

<td>

<button onclick="order(${s.service})"
class="bg-blue-600 text-white px-4 py-1 rounded">

Đặt

</button>

</td>

`

table.appendChild(tr)

})

}

/* SEARCH */

document.getElementById("search").addEventListener("input",(e)=>{

const keyword=e.target.value.toLowerCase()

const filtered=services.filter(s=>
s.name.toLowerCase().includes(keyword)
)

renderServices(filtered)

})

/* ORDER */

function order(id){

window.location="add-order.html?service="+id

}

loadServices()

</script>

</body>
</html>
