<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Users - SMM Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f7fb;
}

.sidebar{
background:#020617;
}

.card{
background:white;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

</style>

</head>

<body>

<div class="flex h-screen">

<!-- SIDEBAR -->

<div class="sidebar w-64 text-white flex flex-col">

<div class="p-6 text-2xl font-bold border-b border-gray-700">
ADMIN PANEL
</div>

<nav class="flex-1 p-4 space-y-2">

<a href="dashboard.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Dashboard
</a>

<a href="users.html" class="block px-4 py-3 rounded-lg bg-blue-600">
Users
</a>

<a href="orders.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Orders
</a>

<a href="payments.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Deposits
</a>

</nav>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<header class="bg-white shadow-sm p-4 flex justify-between">

<h1 class="font-semibold text-lg">
Quản lý người dùng
</h1>

<input
id="search"
placeholder="Tìm username..."
class="border px-3 py-2 rounded"
/>

</header>

<main class="p-6 overflow-y-auto">

<div class="card p-6">

<table class="w-full text-sm">

<thead>

<tr class="border-b text-gray-600">

<th class="py-3 text-left">
Username
</th>

<th>
Email
</th>

<th>
Balance
</th>

<th>
Status
</th>

<th>
Actions
</th>

</tr>

</thead>

<tbody id="usersTable">

</tbody>

</table>

</div>

</main>

</div>

</div>

<script>

const token=localStorage.getItem("token")

if(!token){
window.location="../login.html"
}

let users=[]

/* LOAD USERS */

async function loadUsers(){

const res=await fetch("/api/admin/users",{

headers:{
Authorization:"Bearer "+token
}

})

users=await res.json()

renderUsers(users)

}

function renderUsers(list){

const table=document.getElementById("usersTable")

table.innerHTML=""

list.forEach(u=>{

const tr=document.createElement("tr")

tr.className="border-b hover:bg-gray-50"

tr.innerHTML=`

<td class="py-3">${u.username}</td>

<td>${u.email}</td>

<td>${u.balance} VND</td>

<td>${u.isBlocked ? "Blocked" : "Active"}</td>

<td class="space-x-2">

<button onclick="editBalance('${u._id}')"
class="bg-blue-600 text-white px-3 py-1 rounded">
Edit Balance
</button>

<button onclick="toggleUser('${u._id}')"
class="bg-red-500 text-white px-3 py-1 rounded">
${u.isBlocked ? "Unblock" : "Block"}
</button>

</td>

`

table.appendChild(tr)

})

}

/* SEARCH */

document.getElementById("search").addEventListener("input",(e)=>{

const keyword=e.target.value.toLowerCase()

const filtered=users.filter(u=>
u.username.toLowerCase().includes(keyword)
)

renderUsers(filtered)

})

/* EDIT BALANCE */

async function editBalance(id){

const amount=prompt("Nhập số dư mới:")

if(!amount) return

await fetch("/api/admin/balance/"+id,{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
balance:amount
})

})

loadUsers()

}

/* BLOCK USER */

async function toggleUser(id){

await fetch("/api/admin/block/"+id,{

method:"POST",

headers:{
Authorization:"Bearer "+token
}

})

loadUsers()

}

loadUsers()

</script>

</body>
</html>
