<!DOCTYPE html>
<html lang="vi" class="scroll-smooth" id="htmlRoot">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hỗ trợ Khách hàng - Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom right, #f1f5f9, #e2e8f0);
      transition: background 0.3s ease;
    }
    .sidebar {
      background: linear-gradient(to bottom, #0f172a, #1e293b);
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
      transition: all 0.4s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
    }
    .dark .card {
      background: #1f2937;
      color: white;
    }
    #overlay {
      backdrop-filter: blur(6px);
      transition: opacity 0.4s ease;
    }
    .loader {
      border: 5px solid #e5e7eb;
      border-top: 5px solid #3b82f6;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .status-open { background: #fef3c7; color: #92400e; }
    .status-answered { background: #d1fae5; color: #065f46; }
    .status-closed { background: #e5e7eb; color: #4b5563; }
    .dark .status-open { background: #78350f; color: #fbbf24; }
    .dark .status-answered { background: #064e3b; color: #34d399; }
    .dark .status-closed { background: #374151; color: #9ca3af; }
    tr:hover {
      background-color: #f1f5f9;
    }
    .dark tr:hover {
      background-color: #374151;
    }
    #ticketModal {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
  </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

<!-- OVERLAY (cho sidebar) -->
<div id="overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity duration-400"></div>

<!-- MODAL CHI TIẾT TICKET -->
<div id="ticketModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden transition-opacity duration-300">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
    <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
      <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Chi tiết Ticket</h2>
      <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-3xl">&times;</button>
    </div>

    <div class="p-6 space-y-6" id="modalContent">
      <!-- Nội dung ticket sẽ được render ở đây -->
    </div>

    <div class="p-6 border-t border-gray-200 dark:border-gray-700">
      <textarea id="replyInput" rows="4" placeholder="Nhập phản hồi của bạn..." class="w-full border border-gray-300 dark:border-gray-600 p-4 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white transition"></textarea>
      <div class="mt-4 flex justify-end">
        <button onclick="sendReply()" class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
          Gửi phản hồi
        </button>
      </div>
    </div>
  </div>
</div>

<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR - ĐẦY ĐỦ 13 MỤC -->

        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37zM15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <header class="bg-white dark:bg-gray-800 shadow-md p-4 flex items-center justify-between transition-colors duration-300">

        <button id="menuBtn" class="text-3xl text-gray-700 dark:text-gray-300 hover:text-blue-600 transition">
          ☰
        </button>
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Hỗ trợ Khách hàng</h1>
      </div>

      <div class="flex items-center gap-4">
        <!-- Dark mode toggle -->
        <button id="darkModeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
          <svg id="sunIcon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a3 3 0 11-8 0 3 3 0 018 0z" /></svg>
          <svg id="moonIcon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>

        <!-- Refresh -->
        <button onclick="loadTickets()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
          Refresh
        </button>
      </div>
    </header>

    <main class="p-6 overflow-y-auto bg-gray-50 dark:bg-gray-900 flex-1 transition-colors duration-300">
      <div class="max-w-7xl mx-auto">

        <!-- TITLE + FILTER -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
          <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Hỗ trợ Khách hàng (Tickets)</h1>

          <div class="flex flex-wrap gap-4">
            <input id="search" placeholder="Tìm theo user / tiêu đề" class="border border-gray-300 dark:border-gray-600 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white transition w-full md:w-64">
            <select id="filterStatus" class="border border-gray-300 dark:border-gray-600 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white transition">
              <option value="">Tất cả trạng thái</option>
              <option value="open">Open</option>
              <option value="answered">Answered</option>
              <option value="closed">Closed</option>
            </select>
          </div>
        </div>

        <!-- LOADING -->
        <div id="loading" class="text-center py-20 hidden">
          <div class="loader mx-auto"></div>
          <p class="mt-6 text-lg text-gray-500 dark:text-gray-400">Đang tải danh sách ticket...</p>
        </div>

        <!-- TABLE TICKETS -->
        <div class="card p-8 overflow-x-auto">
          <table class="w-full min-w-max">
            <thead>
              <tr class="border-b border-gray-200 dark:border-gray-700">
                <th class="py-4 px-6 text-left font-semibold text-gray-700 dark:text-gray-300">User</th>
                <th class="py-4 px-6 text-left font-semibold text-gray-700 dark:text-gray-300">Tiêu đề</th>
                <th class="py-4 px-6 text-left font-semibold text-gray-700 dark:text-gray-300">Status</th>
                <th class="py-4 px-6 text-left font-semibold text-gray-700 dark:text-gray-300">Ngày tạo</th>
                <th class="py-4 px-6 text-center font-semibold text-gray-700 dark:text-gray-300">Action</th>
              </tr>
            </thead>
            <tbody id="ticketTable" class="divide-y divide-gray-200 dark:divide-gray-700">
              <!-- Dữ liệu sẽ render ở đây -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  const token = localStorage.getItem("token");
  const user = JSON.parse(localStorage.getItem("user") || "{}");

  if (!token) {
    window.location = "../login.html";
  }

  if (user.role !== "admin") {
    alert("Bạn không có quyền truy cập khu vực Admin!");
    window.location = "../dashboard.html";
  }

  // Dark mode toggle & persist
  const htmlRoot = document.getElementById("htmlRoot");
  const darkToggle = document.getElementById("darkModeToggle");
  const sunIcon = document.getElementById("sunIcon");
  const moonIcon = document.getElementById("moonIcon");

  function toggleDarkMode() {
    htmlRoot.classList.toggle("dark");
    localStorage.setItem("darkMode", htmlRoot.classList.contains("dark"));
    updateIcons();
  }

  function updateIcons() {
    if (htmlRoot.classList.contains("dark")) {
      moonIcon.classList.remove("hidden");
      sunIcon.classList.add("hidden");
    } else {
      sunIcon.classList.remove("hidden");
      moonIcon.classList.add("hidden");
    }
  }

  if (localStorage.getItem("darkMode") === "true" || (!localStorage.getItem("darkMode") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
    htmlRoot.classList.add("dark");
  }
  updateIcons();

  if (darkToggle) darkToggle.addEventListener("click", toggleDarkMode);

  // Sidebar toggle
  const menuBtn = document.getElementById("menuBtn");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  function toggleSidebar() {
    sidebar.classList.toggle("-translate-x-full");
    overlay.classList.toggle("hidden");
  }

  menuBtn.addEventListener("click", toggleSidebar);
  overlay.addEventListener("click", toggleSidebar);

  document.querySelectorAll('#sidebar a').forEach(link => {
    link.addEventListener("click", () => {
      if (window.innerWidth < 768) toggleSidebar();
    });
  });

  let tickets = [];
  let currentTicketId = null;

  // Load Tickets
  async function loadTickets() {
    document.getElementById("loading").classList.remove("hidden");

    try {
      const res = await fetch("/api/admin/tickets", {
        headers: { Authorization: "Bearer " + token }
      });

      if (res.status === 401) {
        logout();
        return;
      }

      if (!res.ok) {
        console.error("Lỗi tải tickets:", res.status, await res.text());
        return;
      }

      tickets = await res.json();

      renderTickets(tickets);
    } catch (e) {
      console.error("loadTickets error:", e);
    } finally {
      document.getElementById("loading").classList.add("hidden");
    }
  }

  // Render Tickets with filter
  function renderTickets(list) {
    const table = document.getElementById("ticketTable");
    table.innerHTML = "";

    const search = document.getElementById("search").value.trim().toLowerCase();
    const filterStatus = document.getElementById("filterStatus").value;

    let filtered = list;

    if (search) {
      filtered = filtered.filter(t =>
        (t.userId?.username || "").toLowerCase().includes(search) ||
        (t.subject || "").toLowerCase().includes(search)
      );
    }

    if (filterStatus) {
      filtered = filtered.filter(t => t.status === filterStatus);
    }

    filtered.forEach(t => {
      const tr = document.createElement("tr");
      tr.className = "border-b border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors cursor-pointer";

      let statusClass = "";
      if (t.status === "open") statusClass = "status-open";
      if (t.status === "answered") statusClass = "status-answered";
      if (t.status === "closed") statusClass = "status-closed";

      tr.innerHTML = `
        <td class="py-4 px-6 font-medium">${t.userId?.username || t.userId || 'Unknown'}</td>
        <td class="py-4 px-6 truncate max-w-xs">${t.subject || '-'}</td>
        <td class="py-4 px-6">
          <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusClass}">
            ${t.status.charAt(0).toUpperCase() + t.status.slice(1)}
          </span>
        </td>
        <td class="py-4 px-6">${new Date(t.createdAt).toLocaleString('vi-VN')}</td>
        <td class="py-4 px-6 text-center">
          <button onclick="viewTicket('${t._id}')" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300">
            Xem
          </button>
        </td>
      `;
      tr.onclick = () => viewTicket(t._id);
      table.appendChild(tr);
    });
  }

  // View Ticket (open modal)
  async function viewTicket(id) {
    currentTicketId = id;

    try {
      const res = await fetch(`/api/admin/ticket/${id}`, {
        headers: { Authorization: "Bearer " + token }
      });

      if (!res.ok) {
        alert("Không tải được ticket");
        return;
      }

      const ticket = await res.json();

      const modalContent = document.getElementById("modalContent");
      modalContent.innerHTML = `
        <div class="space-y-4">
          <div class="flex justify-between">
            <div>
              <p class="text-sm text-gray-500 dark:text-gray-400">User</p>
              <p class="font-medium">${ticket.userId?.username || ticket.userId || 'Unknown'}</p>
            </div>
            <div>
              <p class="text-sm text-gray-500 dark:text-gray-400">Ngày tạo</p>
              <p class="font-medium">${new Date(ticket.createdAt).toLocaleString('vi-VN')}</p>
            </div>
          </div>

          <div>
            <p class="text-sm text-gray-500 dark:text-gray-400">Tiêu đề</p>
            <p class="font-semibold text-lg">${ticket.subject}</p>
          </div>

          <div>
            <p class="text-sm text-gray-500 dark:text-gray-400">Nội dung</p>
            <p class="bg-gray-50 dark:bg-gray-700 p-4 rounded-lg whitespace-pre-wrap">${ticket.message}</p>
          </div>

          <div>
            <p class="text-sm text-gray-500 dark:text-gray-400">Trạng thái</p>
            <span class="px-3 py-1 rounded-full text-xs font-semibold ${ticket.status === 'open' ? 'status
