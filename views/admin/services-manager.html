<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Service Manager - SMM Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f7fb;
}

.sidebar{
background:#020617;
}

.card{
background:white;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

#sidebar{
transition:all .3s;
}

@media (max-width:768px){

#sidebar{
position:fixed;
left:-260px;
top:0;
height:100%;
z-index:50;
}

#sidebar.open{
left:0;
}

}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:40;
}

#overlay.show{
display:block;
}

</style>

</head>

<body>

<div id="overlay"></div>

<div class="flex h-screen">

<!-- SIDEBAR -->

<div id="sidebar" class="sidebar w-64 text-white flex flex-col">

<div class="p-6 text-2xl font-bold border-b border-gray-700">
ADMIN PANEL
</div>

<nav class="flex-1 p-4 space-y-2">

<a href="dashboard.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Dashboard
</a>

<a href="users.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Users
</a>

<a href="orders.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Orders
</a>

<a href="services-manager.html" class="block px-4 py-3 rounded-lg bg-blue-600">
Services
</a>

<a href="payments.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Deposits
</a>

<a href="profit.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Profit
</a>

<a href="settings.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Settings
</a>

</nav>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<header class="bg-white shadow-sm p-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<button id="menuBtn" class="text-2xl md:hidden">
☰
</button>

<h1 class="font-semibold text-lg">
Quản lý dịch vụ
</h1>

</div>

<div class="flex gap-3">

<input id="search"
placeholder="Tìm dịch vụ..."
class="border px-3 py-2 rounded">

<button onclick="sync()"
class="bg-blue-600 text-white px-4 py-2 rounded">
Sync API
</button>

</div>

</header>

<main class="p-6 overflow-y-auto space-y-6">

<!-- ADD SERVICE -->

<div class="card p-6">

<h2 class="font-semibold mb-4">
Thêm dịch vụ thủ công
</h2>

<div class="grid grid-cols-3 gap-4">

<input id="serviceId" placeholder="Provider ID"
class="border p-2 rounded">

<input id="serviceName" placeholder="Tên dịch vụ"
class="border p-2 rounded">

<input id="serviceRate" placeholder="Giá /1000"
class="border p-2 rounded">

<input id="serviceMin" placeholder="Min"
class="border p-2 rounded">

<input id="serviceMax" placeholder="Max"
class="border p-2 rounded">

<button onclick="addService()"
class="bg-green-600 text-white rounded">
Thêm dịch vụ
</button>

</div>

</div>

<!-- SERVICES TABLE -->

<div class="card p-6">

<table class="w-full text-sm">

<thead class="border-b text-gray-600">

<tr>

<th class="text-left py-3">ID</th>
<th>Tên</th>
<th>Rate</th>
<th>Min</th>
<th>Max</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="servicesTable"></tbody>

</table>

</div>

</main>

</div>

</div>

<script>

const token=localStorage.getItem("token")
const user=JSON.parse(localStorage.getItem("user")||"{}")

if(!token){
window.location="../login.html"
}

if(user.role!=="admin"){
alert("Không có quyền admin")
window.location="../dashboard.html"
}

let services=[]

function vnd(x){
return Number(x||0).toLocaleString()+" VND"
}

/* LOAD SERVICES */

async function load(){

const res=await fetch("/api/admin/services",{
headers:{Authorization:"Bearer "+token}
})

services=await res.json()

render(services)

}

function render(list){

const table=document.getElementById("servicesTable")

table.innerHTML=""

list.forEach(s=>{

const tr=document.createElement("tr")

tr.className="border-b hover:bg-gray-50"

tr.innerHTML=`

<td class="py-3">${s.service}</td>

<td>${s.name}</td>

<td>${vnd(s.rate)}</td>

<td>${s.min}</td>

<td>${s.max}</td>

<td>
${s.enabled
? '<span class="text-green-600">Enabled</span>'
: '<span class="text-red-500">Disabled</span>'
}
</td>

<td class="space-x-2">

<button onclick="editRate('${s._id}')"
class="bg-yellow-500 text-white px-3 py-1 rounded">
Edit
</button>

<button onclick="toggle('${s._id}')"
class="bg-gray-800 text-white px-3 py-1 rounded">
Toggle
</button>

<button onclick="remove('${s._id}')"
class="bg-red-500 text-white px-3 py-1 rounded">
Delete
</button>

</td>

`

table.appendChild(tr)

})

}

/* SEARCH */

document.getElementById("search").addEventListener("input",(e)=>{

const keyword=e.target.value.toLowerCase()

const filtered=services.filter(s=>
(s.name||"").toLowerCase().includes(keyword)
)

render(filtered)

})

/* ADD SERVICE */

async function addService(){

const service=document.getElementById("serviceId").value
const name=document.getElementById("serviceName").value
const rate=document.getElementById("serviceRate").value
const min=document.getElementById("serviceMin").value
const max=document.getElementById("serviceMax").value

await fetch("/api/admin/service-add",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
service,
name,
rate,
min,
max
})

})

alert("Đã thêm dịch vụ")

load()

}

/* EDIT RATE */

async function editRate(id){

const rate=prompt("Nhập giá mới /1000")

if(!rate) return

await fetch("/api/admin/service-rate/"+id,{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({rate})
})

alert("Đã cập nhật giá")

load()

}

/* SYNC API */

async function sync(){

await fetch("/api/admin/services/sync",{
method:"POST",
headers:{Authorization:"Bearer "+token}
})

alert("Sync xong")

load()

}

/* TOGGLE */

async function toggle(id){

await fetch("/api/admin/service-toggle/"+id,{
method:"POST",
headers:{Authorization:"Bearer "+token}
})

load()

}

/* DELETE */

async function remove(id){

if(!confirm("Xóa dịch vụ này?")) return

await fetch("/api/admin/service-delete/"+id,{
method:"DELETE",
headers:{Authorization:"Bearer "+token}
})

load()

}

/* SIDEBAR */

const menuBtn=document.getElementById("menuBtn")
const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")

menuBtn.addEventListener("click",()=>{
sidebar.classList.toggle("open")
overlay.classList.toggle("show")
})

overlay.addEventListener("click",()=>{
sidebar.classList.remove("open")
overlay.classList.remove("show")
})

load()

</script>

</body>
</html>
