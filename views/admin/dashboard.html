<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - SMM Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f7fb;
}

.sidebar{
background:#020617;
}

.card{
background:white;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

</style>

</head>

<body>

<div class="flex h-screen">

<!-- SIDEBAR -->

<div class="sidebar w-64 text-white flex flex-col">

<div class="p-6 text-2xl font-bold border-b border-gray-700">
ADMIN PANEL
</div>

<nav class="flex-1 p-4 space-y-2">

<a href="dashboard.html"
class="block px-4 py-3 rounded-lg bg-blue-600">
Dashboard
</a>

<a href="users.html"
class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Users
</a>

<a href="orders.html"
class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Orders
</a>

<a href="payments.html"
class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Deposits
</a>

</nav>

<div class="p-4 border-t border-gray-700">

<button onclick="logout()"
class="w-full bg-red-500 py-2 rounded-lg">
Logout
</button>

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<header class="bg-white shadow-sm p-4">

<h1 class="font-semibold text-lg">
Admin Dashboard
</h1>

</header>

<main class="p-6 overflow-y-auto">

<!-- STATS -->

<div class="grid md:grid-cols-3 gap-6 mb-8">

<div class="card p-6">

<p class="text-gray-500 text-sm">
Total Users
</p>

<h2 class="text-3xl font-bold text-blue-600" id="users">
0
</h2>

</div>

<div class="card p-6">

<p class="text-gray-500 text-sm">
Total Orders
</p>

<h2 class="text-3xl font-bold" id="orders">
0
</h2>

</div>

<div class="card p-6">

<p class="text-gray-500 text-sm">
Revenue
</p>

<h2 class="text-3xl font-bold text-green-600" id="revenue">
0 VND
</h2>

</div>

</div>

<!-- SYSTEM INFO -->

<div class="card p-6">

<h2 class="font-semibold mb-4">
Thông tin hệ thống
</h2>

<div class="space-y-2 text-sm text-gray-600">

<div>
API Provider: smmaz.net
</div>

<div>
Server: Node.js + MongoDB
</div>

<div>
Status: <span class="text-green-600">Online</span>
</div>

</div>

</div>

</main>

</div>

</div>

<script>

const token=localStorage.getItem("token")

if(!token){
window.location="../login.html"
}

async function loadStats(){

const res=await fetch("/api/admin/stats",{

headers:{
Authorization:"Bearer "+token
}

})

const data=await res.json()

document.getElementById("users").innerText=data.users
document.getElementById("orders").innerText=data.orders
document.getElementById("revenue").innerText=data.revenue+" VND"

}

function logout(){

localStorage.removeItem("token")

window.location="../login.html"

}

loadStats()

</script>

</body>
</html>
