<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - SMM Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f7fb;
}

.sidebar{
background:#020617;
}

.card{
background:white;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

#sidebar{
transition:all .3s;
}

@media (max-width:768px){

#sidebar{
position:fixed;
left:-260px;
top:0;
height:100%;
z-index:50;
}

#sidebar.open{
left:0;
}

}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:40;
}

#overlay.show{
display:block;
}

</style>

</head>

<body>

<div id="overlay"></div>

<div class="flex h-screen">

<!-- SIDEBAR -->

<div id="sidebar" class="sidebar w-64 text-white flex flex-col">

<div class="p-6 text-2xl font-bold border-b border-gray-700">
ADMIN PANEL
</div>

<nav class="flex-1 p-4 space-y-2">

<a href="dashboard.html" class="block px-4 py-3 rounded-lg bg-blue-600">
Dashboard
</a>

<a href="users.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Users
</a>

<a href="orders.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Orders
</a>

<a href="services.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Services
</a>

<a href="payments.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Deposits
</a>

<a href="profit.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Profit
</a>

<a href="logs.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Logs
</a>

<a href="settings.html" class="block px-4 py-3 rounded-lg hover:bg-gray-700">
Settings
</a>

</nav>

<div class="p-4 border-t border-gray-700">

<button onclick="logout()"
class="w-full bg-red-500 py-2 rounded-lg">
Logout
</button>

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<header class="bg-white shadow-sm p-4 flex items-center gap-3">

<button id="menuBtn" class="text-2xl md:hidden">
☰
</button>

<h1 class="font-semibold text-lg">
Admin Dashboard
</h1>

</header>

<main class="p-6 overflow-y-auto">

<!-- STATS -->

<div class="grid md:grid-cols-3 gap-6 mb-8">

<div class="card p-6">

<p class="text-gray-500 text-sm">
Total Users
</p>

<h2 class="text-3xl font-bold text-blue-600" id="users">
0
</h2>

</div>

<div class="card p-6">

<p class="text-gray-500 text-sm">
Total Orders
</p>

<h2 class="text-3xl font-bold" id="orders">
0
</h2>

</div>

<div class="card p-6">

<p class="text-gray-500 text-sm">
Revenue
</p>

<h2 class="text-3xl font-bold text-green-600" id="revenue">
0 VND
</h2>

</div>

</div>

<!-- SYSTEM INFO -->

<div class="card p-6">

<h2 class="font-semibold mb-4">
Thông tin hệ thống
</h2>

<div class="space-y-2 text-sm text-gray-600">

<div>
API Provider: smmaz.net
</div>

<div>
Server: Node.js + MongoDB
</div>

<div>
Status: <span class="text-green-600">Online</span>
</div>

</div>

</div>

</main>

</div>

</div>

<script>

const token=localStorage.getItem("token")
const user=JSON.parse(localStorage.getItem("user")||"{}")

if(!token){
window.location="../login.html"
}

/* CHECK ADMIN */

if(user.role!=="admin"){
alert("Không có quyền admin")
window.location="../dashboard.html"
}

/* LOAD STATS */

async function loadStats(){

try{

const res=await fetch("/api/admin/stats",{
headers:{
Authorization:"Bearer "+token
}
})

const data=await res.json()

document.getElementById("users").innerText=data.users||0
document.getElementById("orders").innerText=data.orders||0
document.getElementById("revenue").innerText=(data.revenue||0)+" VND"

}catch{

console.log("API lỗi")

}

}

/* SIDEBAR */

const menuBtn=document.getElementById("menuBtn")
const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")

if(menuBtn){

menuBtn.addEventListener("click",()=>{

sidebar.classList.toggle("open")
overlay.classList.toggle("show")

})

overlay.addEventListener("click",()=>{

sidebar.classList.remove("open")
overlay.classList.remove("show")

})

}

/* LOGOUT */

function logout(){

localStorage.removeItem("token")
localStorage.removeItem("user")

window.location="../login.html"

}

loadStats()

setInterval(loadStats,30000)

</script>

</body>
</html>
