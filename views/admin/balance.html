<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Balance</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f4f7fb;
font-family:Inter, sans-serif;
}

.card{
background:white;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.05);
}

</style>

</head>

<body class="p-8">

<h1 class="text-2xl font-bold mb-6">
Quản lý số dư user
</h1>

<!-- FORM -->

<div class="card p-6 mb-8 max-w-xl">

<div class="grid gap-4">

<input id="username"
placeholder="Username hoặc Email"
class="border p-3 rounded">

<input id="amount"
placeholder="Số tiền"
type="number"
class="border p-3 rounded">

<select id="type"
class="border p-3 rounded">

<option value="add">
Cộng tiền
</option>

<option value="sub">
Trừ tiền
</option>

</select>

<input id="reason"
placeholder="Lý do"
class="border p-3 rounded">

<button onclick="submitBalance()"
class="bg-blue-600 text-white py-3 rounded">

Cập nhật

</button>

</div>

<div id="msg" class="mt-4 text-sm text-blue-600"></div>

</div>

<!-- TRANSACTIONS -->

<div class="card p-6">

<h2 class="font-semibold mb-4">
Lịch sử giao dịch
</h2>

<table class="w-full text-sm">

<thead class="border-b">

<tr>

<th class="text-left py-2">User</th>
<th>Số tiền</th>
<th>Loại</th>
<th>Lý do</th>
<th>Thời gian</th>

</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

const token = localStorage.getItem("token")

/* =========================
   ADD / SUB BALANCE
========================= */

async function submitBalance(){

const username = document.getElementById("username").value
const amount = document.getElementById("amount").value
const type = document.getElementById("type").value
const reason = document.getElementById("reason").value

const msg = document.getElementById("msg")

if(!username || !amount){
msg.innerText = "Thiếu username hoặc số tiền"
return
}

try{

const res = await fetch("/api/admin/manual-balance",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
username,
amount,
type,
reason
})

})

const data = await res.json()

msg.innerText = data.message || data.error

loadLogs()

}catch(e){

msg.innerText = "Lỗi server"

}

}

/* =========================
   LOAD TRANSACTIONS
========================= */

async function loadLogs(){

try{

const res = await fetch("/api/admin/transactions",{

headers:{
Authorization:"Bearer "+token
}

})

const logs = await res.json()

const table = document.getElementById("table")

table.innerHTML=""

logs.forEach(l=>{

const tr = document.createElement("tr")

tr.className="border-b"

tr.innerHTML = `

<td class="py-2">
${l.userId?.username || l.userId}
</td>

<td>
${Number(l.amount).toLocaleString()} VND
</td>

<td>
${l.type}
</td>

<td>
${l.note || ""}
</td>

<td>
${new Date(l.createdAt).toLocaleString()}
</td>

`

table.appendChild(tr)

})

}catch(e){

console.log("Load logs error")

}

}

/* =========================
   INIT
========================= */

loadLogs()

</script>

</body>

</html>
