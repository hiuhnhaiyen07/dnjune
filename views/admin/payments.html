<!DOCTYPE html>
<html lang="vi" class="scroll-smooth" id="htmlRoot">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duyệt Nạp Tiền - Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom right, #f1f5f9, #e2e8f0);
      transition: background 0.3s ease;
    }
    .sidebar {
      background: linear-gradient(to bottom, #0f172a, #1e293b);
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
      transition: all 0.4s ease;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15);
    }
    .dark .card {
      background: #1f2937;
      color: white;
    }
    #overlay {
      backdrop-filter: blur(6px);
      transition: opacity 0.4s ease;
    }
    .loader {
      border: 5px solid #e5e7eb;
      border-top: 5px solid #3b82f6;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    .dark .status-pending { background: #78350f; color: #fbbf24; }
    .dark .status-approved { background: #064e3b; color: #34d399; }
    .dark .status-rejected { background: #7f1d1d; color: #f87171; }
    tr:hover {
      background-color: #f1f5f9;
    }
    .dark tr:hover {
      background-color: #374151;
    }
  </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

<!-- OVERLAY -->
<div id="overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity duration-400"></div>

<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR - ĐẦY ĐỦ 13 MỤC -->
  <div id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-gradient-to-b from-slate-900 to-slate-800 text-white transform -translate-x-full transition-transform duration-400 ease-in-out z-50 md:static md:translate-x-0 shadow-2xl md:shadow-none">
    <div class="p-6 text-2xl font-bold border-b border-slate-700 flex items-center gap-4">
      <svg class="w-10 h-10 text-blue-400 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
      ADMIN PANEL
    </div>

    <nav class="p-5 space-y-2 overflow-y-auto h-[calc(100vh-80px)]">
      <a href="dashboard.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
        Dashboard
      </a>

      <a href="users.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        Users
      </a>

      <a href="balance.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a5 5 0 00-10 0v2m-3 7a3 3 0 003 3h10a3 3 0 003-3v-4a3 3 0 00-3-3H7a3 3 0 00-3 3v4z" /></svg>
        Balance
      </a>

      <a href="orders.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
        Orders
      </a>

      <a href="services.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
        Services
      </a>

      <a href="payments.html" class="flex items-center px-5 py-4 rounded-xl bg-blue-600/90 text-white font-medium hover:bg-blue-700 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H9a2 2 0 00-2 2v2m8 0v6a2 2 0 01-2 2H9a2 2 0 01-2-2V9m8 0H7" /></svg>
        Deposits
      </a>

      <a href="profit.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
        Profit
      </a>

      <a href="logs.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        Logs
      </a>

      <a href="settings.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37zM15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        Settings
      </a>

      <a href="admins.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM6 5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
        Admins
      </a>

      <div class="pt-8 mt-8 border-t border-slate-700">
        <button onclick="logout()" class="flex items-center w-full px-5 py-4 rounded-xl text-red-400 hover:bg-red-900/30 transition-colors font-medium">
          <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Đăng xuất
        </button>
      </div>
    </nav>
  </div>

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <header class="bg-white dark:bg-gray-800 shadow-md p-4 flex items-center justify-between transition-colors duration-300">
      <div class="flex items-center gap-5">
        <button id="menuBtn" class="text-3xl text-gray-700 dark:text-gray-300 hover:text-blue-600 transition">
          ☰
        </button>
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Duyệt Nạp Tiền</h1>
      </div>

      <div class="flex items-center gap-4">
        <!-- Dark mode toggle -->
        <button id="darkModeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
          <svg id="sunIcon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a3 3 0 11-8 0 3 3 0 018 0z" /></svg>
          <svg id="moonIcon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>

        <!-- Refresh -->
        <button onclick="loadPayments()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
          Refresh
        </button>
      </div>
    </header>

    <main class="p-6 overflow-y-auto bg-gray-50 dark:bg-gray-900 flex-1 transition-colors duration-300">
      <div class="max-w-7xl mx-auto">

        <!-- TITLE + FILTER -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
          <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Duyệt Nạp Tiền</h1>

          <div class="flex flex-wrap gap-4">
            <input id="searchUser" placeholder="Tìm theo user" class="border border-gray-300 dark:border-gray-600 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white transition w-full md:w-64">
            <select id="filterStatus" class="border border-gray-300 dark:border-gray-600 px-4 py-3 rounded-xl focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white transition">
              <option value="">Tất cả trạng thái</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>

        <!-- LOADING -->
        <div id="loading" class="text-center py-20 hidden">
          <div class="loader mx-auto"></div>
          <p class="mt-6 text-lg text-gray-500 dark:text-gray-400">Đang tải danh sách nạp tiền...</p>
        </div>

        <!-- TABLE PAYMENTS -->
        <div class="card p-8 overflow-x-auto">
          <table class="w-full min-w-max">
            <thead>
              <tr class="border-b border-gray-200 dark:border-gray-700">
                <th class="py-4 px-6 text-left font-semibold text-gray-700 dark:text-gray-300">User</th>
                <th class="py-4 px-6 text-left font-semibold text-gray-700 dark:text-gray-300">Amount</th>
                <th class="py-4 px-6 text-left font-semibold text-gray-700 dark:text-gray-300">Bill</th>
                <th class="py-4 px-6 text-left font-semibold text-gray-700 dark:text-gray-300">Status</th>
                <th class="py-4 px-6 text-left font-semibold text-gray-700 dark:text-gray-300">Date</th>
                <th class="py-4 px-6 text-center font-semibold text-gray-700 dark:text-gray-300">Action</th>
              </tr>
            </thead>
            <tbody id="paymentsTable" class="divide-y divide-gray-200 dark:divide-gray-700">
              <!-- Dữ liệu sẽ render ở đây -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  const token = localStorage.getItem("token");
  const user = JSON.parse(localStorage.getItem("user") || "{}");

  if (!token) {
    window.location = "../login.html";
  }

  if (user.role !== "admin") {
    alert("Bạn không có quyền truy cập khu vực Admin!");
    window.location = "../dashboard.html";
  }

  // Dark mode toggle & persist
  const htmlRoot = document.getElementById("htmlRoot");
  const darkToggle = document.getElementById("darkModeToggle");
  const sunIcon = document.getElementById("sunIcon");
  const moonIcon = document.getElementById("moonIcon");

  function toggleDarkMode() {
    htmlRoot.classList.toggle("dark");
    localStorage.setItem("darkMode", htmlRoot.classList.contains("dark"));
    updateIcons();
  }

  function updateIcons() {
    if (htmlRoot.classList.contains("dark")) {
      moonIcon.classList.remove("hidden");
      sunIcon.classList.add("hidden");
    } else {
      sunIcon.classList.remove("hidden");
      moonIcon.classList.add("hidden");
    }
  }

  if (localStorage.getItem("darkMode") === "true" || (!localStorage.getItem("darkMode") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
    htmlRoot.classList.add("dark");
  }
  updateIcons();

  if (darkToggle) darkToggle.addEventListener("click", toggleDarkMode);

  // Sidebar toggle
  const menuBtn = document.getElementById("menuBtn");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  function toggleSidebar() {
    sidebar.classList.toggle("-translate-x-full");
    overlay.classList.toggle("hidden");
  }

  menuBtn.addEventListener("click", toggleSidebar);
  overlay.addEventListener("click", toggleSidebar);

  document.querySelectorAll('#sidebar a').forEach(link => {
    link.addEventListener("click", () => {
      if (window.innerWidth < 768) toggleSidebar();
    });
  });

  let payments = [];

  // Load Payments
  async function loadPayments() {
    document.getElementById("loading").classList.remove("hidden");

    try {
      const res = await fetch("/api/admin/payments", {
        headers: { Authorization: "Bearer " + token }
      });

      if (res.status === 401) {
        logout();
        return;
      }

      if (!res.ok) {
        console.error("Lỗi tải payments:", res.status, await res.text());
        return;
      }

      payments = await res.json();

      renderPayments(payments);
    } catch (e) {
      console.error("loadPayments error:", e);
    } finally {
      document.getElementById("loading").classList.add("hidden");
    }
  }

  // Render Payments with filter
  function renderPayments(list) {
    const table = document.getElementById("paymentsTable");
    table.innerHTML = "";

    const search = document.getElementById("searchUser").value.trim().toLowerCase();
    const filterStatus = document.getElementById("filterStatus").value;

    let filtered = list;

    if (search) {
      filtered = filtered.filter(p =>
        (p.userId?.username || p.userId || "").toLowerCase().includes(search)
      );
    }

    if (filterStatus) {
      filtered = filtered.filter(p => p.status === filterStatus);
    }

    filtered.forEach(p => {
      const tr = document.createElement("tr");
      tr.className = "border-b border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors";

      let statusClass = "";
      if (p.status === "pending") statusClass = "status-pending";
      if (p.status === "approved") statusClass = "status-approved";
      if (p.status === "rejected") statusClass = "status-rejected";

      tr.innerHTML = `
        <td class="py-4 px-6 font-medium">${p.userId?.username || p.userId || '-'}</td>
        <td class="py-4 px-6 font-bold text-green-600 dark:text-green-400">${Number(p.amount).toLocaleString()} VND</td>
        <td class="py-4 px-6">
          ${p.billImage ? `
            <a href="/${p.billImage}" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline">
              Xem hóa đơn
            </a>` : '-'}
        </td>
        <td class="py-4 px-6">
          <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusClass}">
            ${p.status.charAt(0).toUpperCase() + p.status.slice(1)}
          </span>
        </td>
        <td class="py-4 px-6">${new Date(p.createdAt).toLocaleString('vi-VN')}</td>
        <td class="py-4 px-6 text-center space-x-4">
          ${p.status === "pending" ? `
            <button onclick="approve('${p._id}')" class="text-green-600 hover:text-green-800 dark:text-green-400 dark:hover:text-green-300">
              Approve
            </button>
            <button onclick="reject('${p._id}')" class="text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300">
              Reject
            </button>
          ` : '-'}
        </td>
      `;
      table.appendChild(tr);
    });
  }

  // Approve Payment
  async function approve(id) {
    if (!confirm("Xác nhận duyệt nạp tiền này?")) return;

    try {
      const res = await fetch(`/api/admin/approve/${id}`, {
        method: "POST",
        headers: { Authorization: "Bearer " + token }
      });

      if (res.ok) {
        alert("Duyệt thành công!");
        loadPayments();
      } else {
        alert("Duyệt thất bại");
      }
    } catch (e) {
      console.error(e);
      alert("Lỗi kết nối");
    }
  }

  // Reject Payment
  async function reject(id) {
    if (!confirm("Xác nhận từ chối nạp tiền này?")) return;

    try {
      const res = await fetch(`/api/admin/reject/${id}`, {
        method: "POST",
        headers: { Authorization: "Bearer " + token }
      });

      if (res.ok) {
        alert("Từ chối thành công!");
        loadPayments();
      } else {
        alert("Từ chối thất bại");
      }
    } catch (e) {
      console.error(e);
      alert("Lỗi kết nối");
    }
  }

  function logout() {
    if (confirm("Bạn có chắc chắn muốn đăng xuất khỏi Admin Panel?")) {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location = "../login.html";
    }
  }

  // Khởi động + filter realtime
  loadPayments();

  document.getElementById("searchUser").addEventListener("input", () => renderPayments(payments));
  document.getElementById("filterStatus").addEventListener("change", () => renderPayments(payments));
</script>

</body>
</html>
