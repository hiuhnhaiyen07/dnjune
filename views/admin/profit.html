<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Profit</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

<h1 class="text-2xl font-bold mb-6">
Thống kê lợi nhuận
</h1>

<div class="grid grid-cols-3 gap-6">

<div class="bg-white p-6 rounded-xl shadow">
<p>Doanh thu</p>
<h2 id="revenue" class="text-xl font-bold">0</h2>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<p>Chi phí API</p>
<h2 id="cost" class="text-xl font-bold">0</h2>
</div>

<div class="bg-white p-6 rounded-xl shadow">
<p>Lợi nhuận</p>
<h2 id="profit" class="text-xl font-bold text-green-600">0</h2>
</div>

</div>

<script>

const token=localStorage.getItem("token")

async function load(){

const res=await fetch("/api/admin/profit",{
headers:{Authorization:"Bearer "+token}
})

const data=await res.json()

document.getElementById("revenue").innerText=data.revenue
document.getElementById("cost").innerText=data.cost
document.getElementById("profit").innerText=data.profit

}

load()

</script>

</body>
</html>
