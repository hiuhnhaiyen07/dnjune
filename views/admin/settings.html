<!DOCTYPE html>
<html lang="vi" class="scroll-smooth" id="htmlRoot">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cài đặt Panel - Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom right, #f1f5f9, #e2e8f0);
      transition: background 0.3s ease;
    }
    .sidebar {
      background: linear-gradient(to bottom, #0f172a, #1e293b);
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
      transition: all 0.4s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
    }
    .dark .card {
      background: #1f2937;
      color: white;
    }
    #overlay {
      backdrop-filter: blur(6px);
      transition: opacity 0.4s ease;
    }
    .loader {
      border: 5px solid #e5e7eb;
      border-top: 5px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

<!-- OVERLAY -->
<div id="overlay" class="fixed inset-0 bg-black/60 z-40 hidden transition-opacity duration-400"></div>

<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR - ĐẦY ĐỦ 13 MỤC -->
  <div id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-gradient-to-b from-slate-900 to-slate-800 text-white transform -translate-x-full transition-transform duration-400 ease-in-out z-50 md:static md:translate-x-0 shadow-2xl md:shadow-none">
    <div class="p-6 text-2xl font-bold border-b border-slate-700 flex items-center gap-4">
      <svg class="w-10 h-10 text-blue-400 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
      ADMIN PANEL
    </div>

    <nav class="p-5 space-y-2 overflow-y-auto h-[calc(100vh-80px)]">
      <a href="dashboard.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
        Dashboard
      </a>

      <a href="users.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        Users
      </a>

      <a href="balance.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a5 5 0 00-10 0v2m-3 7a3 3 0 003 3h10a3 3 0 003-3v-4a3 3 0 00-3-3H7a3 3 0 00-3 3v4z" /></svg>
        Balance
      </a>

      <a href="orders.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
        Orders
      </a>

      <a href="services.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
        Services
      </a>

      <a href="payments.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H9a2 2 0 00-2 2v2m8 0v6a2 2 0 01-2 2H9a2 2 0 01-2-2V9m8 0H7" /></svg>
        Deposits
      </a>

      <a href="profit.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
        Profit
      </a>

      <a href="logs.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        Logs
      </a>

      <a href="settings.html" class="flex items-center px-5 py-4 rounded-xl bg-blue-600/90 text-white font-medium hover:bg-blue-700 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37zM15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        Settings
      </a>

      <a href="admins.html" class="flex items-center px-5 py-4 rounded-xl hover:bg-slate-700/70 transition-all">
        <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM6 5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
        Admins
      </a>

      <div class="pt-8 mt-8 border-t border-slate-700">
        <button onclick="logout()" class="flex items-center w-full px-5 py-4 rounded-xl text-red-400 hover:bg-red-900/30 transition-colors font-medium">
          <svg class="w-6 h-6 mr-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Đăng xuất
        </button>
      </div>
    </nav>
  </div>

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <header class="bg-white dark:bg-gray-800 shadow-md p-4 flex items-center justify-between transition-colors duration-300">
      <div class="flex items-center gap-5">
        <button id="menuBtn" class="text-3xl text-gray-700 dark:text-gray-300 hover:text-blue-600 transition">
          ☰
        </button>
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Cài đặt Panel</h1>
      </div>

      <div class="flex items-center gap-4">
        <!-- Dark mode toggle -->
        <button id="darkModeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
          <svg id="sunIcon" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a3 3 0 11-8 0 3 3 0 018 0z" /></svg>
          <svg id="moonIcon" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>

        <!-- Save Button -->
        <button onclick="saveSettings()" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
          Lưu Cài đặt
        </button>
      </div>
    </header>

    <main class="p-6 overflow-y-auto bg-gray-50 dark:bg-gray-900 flex-1 transition-colors duration-300">
      <div class="max-w-4xl mx-auto">

        <!-- LOADING -->
        <div id="loading" class="text-center py-20 hidden">
          <div class="loader mx-auto"></div>
          <p class="mt-6 text-lg text-gray-500 dark:text-gray-400">Đang tải cài đặt...</p>
        </div>

        <!-- SETTINGS FORM -->
        <div class="card p-10 space-y-8">
          <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Cài đặt chung</h2>

          <div class="grid md:grid-cols-2 gap-8">
            <!-- Site Name -->
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Tên Website</label>
              <input id="siteName" placeholder="Ví dụ: DNJune SMM Panel" class="w-full border border-gray-300 dark:border-gray-600 p-4 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 dark:bg-gray-800 dark:text-white transition">
            </div>

            <!-- Currency -->
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Đơn vị tiền tệ</label>
              <input id="currency" placeholder="VD: VND, USD" class="w-full border border-gray-300 dark:border-gray-600 p-4 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 dark:bg-gray-800 dark:text-white transition">
            </div>

            <!-- Logo URL -->
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">URL Logo (tùy chọn)</label>
              <input id="logoUrl" placeholder="https://example.com/logo.png" class="w-full border border-gray-300 dark:border-gray-600 p-4 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 dark:bg-gray-800 dark:text-white transition">
            </div>

            <!-- Min Deposit -->
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Số tiền nạp tối thiểu (VND)</label>
              <input id="minDeposit" type="number" placeholder="100000" min="10000" class="w-full border border-gray-300 dark:border-gray-600 p-4 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 dark:bg-gray-800 dark:text-white transition">
            </div>

            <!-- Contact Email -->
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email hỗ trợ</label>
              <input id="contactEmail" type="email" placeholder="support@dnjune.com" class="w-full border border-gray-300 dark:border-gray-600 p-4 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 dark:bg-gray-800 dark:text-white transition">
            </div>

            <!-- Maintenance Mode -->
            <div class="md:col-span-2">
              <label class="flex items-center gap-3">
                <input id="maintenance" type="checkbox" class="w-5 h-5 text-green-600 rounded border-gray-300 dark:border-gray-600 focus:ring-green-500">
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Bật chế độ bảo trì (Maintenance Mode)</span>
              </label>
              <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Khi bật, người dùng sẽ thấy thông báo bảo trì và không thể đăng nhập/đặt đơn.</p>
            </div>
          </div>

          <!-- Save Button -->
          <div class="flex justify-end mt-8">
            <button onclick="saveSettings()" id="saveBtn" class="px-10 py-4 bg-green-600 text-white font-medium rounded-xl hover:bg-green-700 transition flex items-center gap-3 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
              <span id="saveText">Lưu Cài đặt</span>
              <svg class="w-5 h-5 animate-spin hidden" id="saveSpinner" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
          </div>

          <div id="msg" class="mt-6 text-center text-lg font-medium"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
  const token = localStorage.getItem("token");
  const user = JSON.parse(localStorage.getItem("user") || "{}");

  if (!token) {
    window.location = "../login.html";
  }

  if (user.role !== "admin") {
    alert("Bạn không có quyền truy cập khu vực Admin!");
    window.location = "../dashboard.html";
  }

  // Dark mode toggle & persist
  const htmlRoot = document.getElementById("htmlRoot");
  const darkToggle = document.getElementById("darkModeToggle");
  const sunIcon = document.getElementById("sunIcon");
  const moonIcon = document.getElementById("moonIcon");

  function toggleDarkMode() {
    htmlRoot.classList.toggle("dark");
    localStorage.setItem("darkMode", htmlRoot.classList.contains("dark"));
    updateIcons();
  }

  function updateIcons() {
    if (htmlRoot.classList.contains("dark")) {
      moonIcon.classList.remove("hidden");
      sunIcon.classList.add("hidden");
    } else {
      sunIcon.classList.remove("hidden");
      moonIcon.classList.add("hidden");
    }
  }

  if (localStorage.getItem("darkMode") === "true" || (!localStorage.getItem("darkMode") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
    htmlRoot.classList.add("dark");
  }
  updateIcons();

  if (darkToggle) darkToggle.addEventListener("click", toggleDarkMode);

  // Sidebar toggle
  const menuBtn = document.getElementById("menuBtn");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  function toggleSidebar() {
    sidebar.classList.toggle("-translate-x-full");
    overlay.classList.toggle("hidden");
  }

  menuBtn.addEventListener("click", toggleSidebar);
  overlay.addEventListener("click", toggleSidebar);

  document.querySelectorAll('#sidebar a').forEach(link => {
    link.addEventListener("click", () => {
      if (window.innerWidth < 768) toggleSidebar();
    });
  });

  // Load Settings
  async function loadSettings() {
    document.getElementById("loading").classList.remove("hidden");

    try {
      const res = await fetch("/api/admin/settings", {
        headers: { Authorization: "Bearer " + token }
      });

      if (res.status === 401) {
        logout();
        return;
      }

      if (!res.ok) throw new Error("API error");

      const data = await res.json();

      document.getElementById("siteName").value = data.siteName || "";
      document.getElementById("currency").value = data.currency || "VND";
      document.getElementById("logoUrl").value = data.logoUrl || "";
      document.getElementById("minDeposit").value = data.minDeposit || 100000;
      document.getElementById("contactEmail").value = data.contactEmail || "";
      document.getElementById("maintenance").checked = data.maintenance || false;
    } catch (e) {
      console.error("loadSettings error:", e);
    } finally {
      document.getElementById("loading").classList.add("hidden");
    }
  }

  // Save Settings
  async function saveSettings() {
    const saveBtn = document.getElementById("saveBtn");
    const saveText = document.getElementById("saveText");
    const saveSpinner = document.getElementById("saveSpinner");
    const msg = document.getElementById("msg");

    msg.innerText = "";
    saveBtn.disabled = true;
    saveText.innerText = "Đang lưu...";
    saveSpinner.classList.remove("hidden");

    const settings = {
      siteName: document.getElementById("siteName").value.trim(),
      currency: document.getElementById("currency").value.trim(),
      logoUrl: document.getElementById("logoUrl").value.trim(),
      minDeposit: Number(document.getElementById("minDeposit").value),
      contactEmail: document.getElementById("contactEmail").value.trim(),
      maintenance: document.getElementById("maintenance").checked
    };

    if (!settings.siteName || !settings.currency) {
      msg.innerText = "Vui lòng điền đầy đủ Tên website và Đơn vị tiền tệ!";
      msg.className = "mt-6 text-center text-lg font-medium text-red-600";
      saveBtn.disabled = false;
      saveText.innerText = "Lưu Cài đặt";
      saveSpinner.classList.add("hidden");
      return;
    }

    try {
      const res = await fetch("/api/admin/settings", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token
        },
        body: JSON.stringify(settings)
      });

      if (res.ok) {
        msg.innerText = "Cài đặt đã được lưu thành công!";
        msg.className = "mt-6 text-center text-lg font-medium text-green-600";
      } else {
        const data = await res.json();
        msg.innerText = data.error || "Lưu cài đặt thất bại";
        msg.className = "mt-6 text-center text-lg font-medium text-red-600";
      }
    } catch (e) {
      msg.innerText = "Lỗi kết nối server";
      msg.className = "mt-6 text-center text-lg font-medium text-red-600";
      console.error(e);
    } finally {
      saveBtn.disabled = false;
      saveText.innerText = "Lưu Cài đặt";
      saveSpinner.classList.add("hidden");
    }
  }

  function logout() {
    if (confirm("Bạn có chắc chắn muốn đăng xuất khỏi Admin Panel?")) {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location = "../login.html";
    }
  }

  // Khởi động
  loadSettings();
</script>

</body>
</html>
