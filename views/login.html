<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng nhập - SMM Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#e8f1ff,#ffffff);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.glass{
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.75);
border:1px solid rgba(255,255,255,0.3);
}

</style>

</head>

<body>

<div class="w-full max-w-md px-6">

<div class="glass shadow-xl rounded-3xl p-10">

<!-- LOGO -->

<div class="text-center mb-8">

<h1 class="text-3xl font-bold text-blue-600">
SMM PANEL
</h1>

<p class="text-gray-500 text-sm mt-2">
Đăng nhập để tiếp tục
</p>

</div>

<!-- FORM -->

<form id="loginForm" class="space-y-6">

<div>

<label class="text-sm font-medium text-gray-600">
Username hoặc Gmail
</label>

<input
type="text"
id="username"
placeholder="Nhập username hoặc gmail"
required
class="mt-2 w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none"
/>

</div>

<div>

<label class="text-sm font-medium text-gray-600">
Mật khẩu
</label>

<div class="relative">

<input
type="password"
id="password"
placeholder="Nhập mật khẩu"
required
class="mt-2 w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none"
/>

<button
type="button"
onclick="togglePassword()"
class="absolute right-3 top-4 text-gray-500 text-sm">

Hiện

</button>

</div>

</div>

<button
type="submit"
id="loginBtn"
class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition">

Đăng nhập

</button>

<div id="message" class="text-center text-sm text-red-500"></div>

</form>

<div class="text-center mt-6 text-sm">

Chưa có tài khoản?

<a href="register.html" class="text-blue-600 hover:underline">
Đăng ký
</a>

</div>

</div>

</div>

<script>

function togglePassword(){

const input=document.getElementById("password")

if(input.type==="password"){
input.type="text"
}else{
input.type="password"
}

}

const form=document.getElementById("loginForm")

form.addEventListener("submit",async(e)=>{

e.preventDefault()

const btn=document.getElementById("loginBtn")
const msg=document.getElementById("message")

btn.innerText="Đang đăng nhập..."

const username=document.getElementById("username").value
const password=document.getElementById("password").value

try{

const res=await fetch("/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})

})

const data=await res.json()

if(data.token){

/* LƯU TOKEN */

localStorage.setItem("token",data.token)

/* LƯU USER (QUAN TRỌNG CHO ADMIN) */

localStorage.setItem("user",JSON.stringify(data.user))

/* CHUYỂN TRANG */

window.location="dashboard.html"

}else{

msg.innerText=data.error || "Đăng nhập thất bại"

}

}catch(err){

msg.innerText="Server lỗi"

}

btn.innerText="Đăng nhập"

})

</script>

</body>
</html>
